<!doctype html>

<head>
  <title>{% block title %}{% endblock %} - Ankh</title>

  <meta charset="UTF-8">
  <meta name="description" content="">
  <meta name="keywords" content="">
  <meta name="author" content="Yucked">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">


  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap/bootstrap.css') }}">
  <style type="text/css">
    html,
    body {
      color: #ced2d6 !important;
      background-color: #141414;
    }

    .nav-bg-dark {
      background-color: #db0c63;
    }
  </style>

  <script type="text/javascript" src="{{ url_for('static', filename='js/jquery-3.5.1.min.js') }}"
    crossorigin="anonymous"></script>
  <script type="text/javascript" src="{{ url_for('static', filename='js/bootstrap/bootstrap.js') }}"
    crossorigin="anonymous"></script>

  {% block head %}
  {% endblock %}
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark nav-bg-dark">
    <a class="navbar-brand" href="#">
      <img src="/imgs/logo.svg" width="30" height="30" class="d-inline-block align-top" alt="">
      Ankh
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup"
      aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-item nav-link active" href="{{ url_for('index') }}">Home
          <span class="sr-only">(current)</span></a>
        <a class="nav-item nav-link" href="#">Features</a>
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}
    {% endblock %}
  </div>
</body>

</html>
